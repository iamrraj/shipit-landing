# /etc/nginx/sites-available/shipit.dev
# ln -s /etc/nginx/sites-available/shipit.dev /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name shipit.dev www.shipit.dev;

    # ── install.sh — one-liner installer ─────────────────
    # Usage: curl -fsSL https://shipit.dev/install.sh | bash
    location = /install.sh {
        alias /opt/shipit/install.sh;
        default_type text/plain;
        add_header Content-Disposition 'inline';
        add_header Cache-Control 'public, max-age=300';
    }

    # ── Releases — download archives + version.txt ───────
    # /releases/latest/version.txt
    # /releases/v1.0.0/shipit-app-v1.0.0.tar.gz
    location /releases/ {
        alias /opt/shipit/releases/;
        autoindex off;
        add_header Cache-Control 'public, max-age=3600';
    }

    # ── Django API ───────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Django Admin ─────────────────────────────────────
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django static files (admin CSS/JS) ───────────────
    location /static/ {
        alias /opt/shipit/backend/staticfiles/;
    }

    # ── Landing page (React SPA) — catch-all ─────────────
    location / {
        root /opt/shipit/landing-page/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control 'public, max-age=3600';
    }

    # ── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 100M;
}
