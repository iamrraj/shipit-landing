<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="textglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="396"/><line x1="66" y1="0" x2="66" y2="396"/>
    <line x1="132" y1="0" x2="132" y2="396"/><line x1="198" y1="0" x2="198" y2="396"/>
    <line x1="264" y1="0" x2="264" y2="396"/><line x1="330" y1="0" x2="330" y2="396"/>
    <line x1="396" y1="0" x2="396" y2="396"/><line x1="462" y1="0" x2="462" y2="396"/>
    <line x1="528" y1="0" x2="528" y2="396"/><line x1="594" y1="0" x2="594" y2="396"/>
    <line x1="660" y1="0" x2="660" y2="396"/><line x1="726" y1="0" x2="726" y2="396"/>
    <line x1="792" y1="0" x2="792" y2="396"/><line x1="858" y1="0" x2="858" y2="396"/>
    <line x1="924" y1="0" x2="924" y2="396"/><line x1="990" y1="0" x2="990" y2="396"/>
    <line x1="1056" y1="0" x2="1056" y2="396"/><line x1="1122" y1="0" x2="1122" y2="396"/>
    <line x1="1188" y1="0" x2="1188" y2="396"/><line x1="1254" y1="0" x2="1254" y2="396"/>
    <line x1="1320" y1="0" x2="1320" y2="396"/><line x1="1386" y1="0" x2="1386" y2="396"/>
    <line x1="1452" y1="0" x2="1452" y2="396"/><line x1="1518" y1="0" x2="1518" y2="396"/>
    <line x1="1584" y1="0" x2="1584" y2="396"/>
    <line x1="0" y1="66" x2="1584" y2="66"/><line x1="0" y1="132" x2="1584" y2="132"/>
    <line x1="0" y1="198" x2="1584" y2="198"/><line x1="0" y1="264" x2="1584" y2="264"/>
    <line x1="0" y1="330" x2="1584" y2="330"/>
  </g>

  <!-- Ambient glow orbs -->
  <circle cx="300" cy="200" r="250" fill="#6366f1" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="1200" cy="150" r="200" fill="#2563eb" opacity="0.05" filter="url(#blur1)"/>
  <circle cx="800" cy="350" r="180" fill="#6366f1" opacity="0.03" filter="url(#blur2)"/>

  <!-- Decorative pipeline dots (right side) -->
  <g transform="translate(1280, 80)">
    <circle cx="0" cy="0" r="6" fill="#6366f1" opacity="0.6"/>
    <line x1="0" y1="6" x2="0" y2="40" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="46" r="6" fill="#2563eb" opacity="0.5"/>
    <line x1="0" y1="52" x2="0" y2="86" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="92" r="6" fill="#6366f1" opacity="0.4"/>
    <line x1="0" y1="98" x2="0" y2="132" stroke="#6366f1" stroke-width="1.5" opacity="0.2"/>
    <circle cx="0" cy="138" r="6" fill="#2563eb" opacity="0.3"/>
    <line x1="0" y1="144" x2="0" y2="178" stroke="#2563eb" stroke-width="1.5" opacity="0.15"/>
    <circle cx="0" cy="184" r="6" fill="#6366f1" opacity="0.2"/>
    <line x1="0" y1="190" x2="0" y2="224" stroke="#6366f1" stroke-width="1.5" opacity="0.1"/>
    <circle cx="0" cy="230" r="6" fill="#2563eb" opacity="0.15"/>
  </g>

  <!-- Decorative code brackets (left side) -->
  <g transform="translate(80, 100)" opacity="0.08" fill="none" stroke="#2563eb" stroke-width="2">
    <path d="M30,0 L10,0 L10,60 L30,60"/>
    <path d="M50,0 L70,0 L70,60 L50,60"/>
  </g>
  <g transform="translate(120, 240)" opacity="0.05" fill="none" stroke="#6366f1" stroke-width="2">
    <path d="M30,0 L10,0 L10,50 L30,50"/>
    <path d="M50,0 L70,0 L70,50 L50,50"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1584" height="3" fill="url(#accent)" opacity="0.8"/>

  <!-- ShipIt logo text -->
  <text x="792" y="145" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="white">
    Ship<tspan fill="url(#accent)">It</tspan>
  </text>

  <!-- Glow behind logo -->
  <text x="792" y="145" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#6366f1" opacity="0.15" filter="url(#textglow)">
    ShipIt
  </text>

  <!-- Tagline -->
  <text x="792" y="200" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#94a3b8" letter-spacing="1">
    AI Developer Workspace
  </text>

   <!-- URL -->
  <text x="792" y="225" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="500" fill="#fff" opacity="0.7" letter-spacing="1">
    shipiit.com
  </text>

  <!-- Subtitle / value prop -->
  <text x="792" y="250" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#64748b" letter-spacing="0.5">
    Ship code, not just suggestions — from prompt to PR in one pipeline
  </text>

  

  <!-- Feature badges -->
  <g transform="translate(792, 295)" text-anchor="middle">
    <!-- Badge: 4 Engines -->
    <rect x="-380" y="-14" width="120" height="28" rx="14" fill="#2563eb" opacity="0.12"/>
    <text x="-320" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" letter-spacing="0.8">4 AI ENGINES</text>

    <!-- Badge: 7-Step Pipeline -->
    <rect x="-220" y="-14" width="150" height="28" rx="14" fill="#2563eb" opacity="0.12"/>
    <text x="-145" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" letter-spacing="0.8">7-STEP PIPELINE</text>

    <!-- Badge: 28+ MCPs -->
    <rect x="-30" y="-14" width="110" height="28" rx="14" fill="#6366f1" opacity="0.12"/>
    <text x="25" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc" letter-spacing="0.8">28+ MCPs</text>

    <!-- Badge: 100+ Models -->
    <rect x="120" y="-14" width="130" height="28" rx="14" fill="#2563eb" opacity="0.12"/>
    <text x="185" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" letter-spacing="0.8">100+ MODELS</text>
  </g>

 

  <!-- Bottom accent line -->
  <rect x="0" y="393" width="1584" height="3" fill="url(#accent)" opacity="0.4"/>
</svg>
