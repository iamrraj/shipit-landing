<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="60" x2="60" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="50%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="iconSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="arrowG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <linearGradient id="itGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="badgeBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- icon drop shadow -->
  <rect x="5" y="11" width="48" height="48" rx="12" fill="#1e3a8a" opacity="0.3"/>
  <!-- icon -->
  <rect x="4" y="6" width="48" height="48" rx="11" fill="url(#iconBg)"/>
  <!-- inner border -->
  <rect x="4.8" y="6.8" width="46.4" height="46.4" rx="10.4" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  <!-- top sheen -->
  <rect x="4.8" y="6.8" width="46.4" height="22" rx="10" fill="url(#iconSheen)"/>
  <!-- bottom depth -->
  <rect x="4" y="42" width="48" height="12" rx="11" fill="rgba(0,0,30,0.16)"/>
  <!-- 3 dots -->
  <circle cx="16" cy="30" r="2.6" fill="rgba(255,255,255,0.2)"/>
  <circle cx="23" cy="30" r="2.8" fill="rgba(255,255,255,0.42)"/>
  <circle cx="30" cy="30" r="3"   fill="rgba(255,255,255,0.72)"/>
  <!-- arrow -->
  <line x1="34" y1="30" x2="44" y2="30" stroke="url(#arrowG)" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M38 22 L48 30 L38 38" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ship — uses currentColor so works on both themes -->
  <text x="64" y="42"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="32" font-weight="800" letter-spacing="-0.03em">
    <tspan fill="currentColor">Ship</tspan> <tspan fill="url(#itGrad)" >It.</tspan>
  </text>

  <!-- Badge -->
  <rect x="166" y="29" width="90" height="18" rx="9"
    fill="url(#badgeBg)" opacity="0.12"
    stroke="url(#badgeBg)" stroke-width="0.8"/>
  <!-- badge dot -->
  <circle cx="175" cy="39" r="2.4" fill="#3b82f6"/>
  <!-- badge text -->
  <text x="215" y="42"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="8" font-weight="700" fill="#3b82f6"
    text-anchor="middle" letter-spacing="0.16em">SHIP FASTER</text>
</svg>