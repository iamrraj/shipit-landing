<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ShipIt — Open-Source AI Developer Workspace | Ship Code with AI</title>
    <meta name="description" content="ShipIt is the open-source AI developer workspace that unifies Claude, Codex, Gemini, and 100+ models into one control surface. Build, review, test, and ship production-ready code from a single message." />
    <meta name="keywords" content="AI developer tools, AI coding assistant, open source AI workspace, Claude Code, OpenAI Codex, Gemini CLI, AI code review, AI code generation, developer productivity, AI pair programming, ShipIt CLI, AI DevOps, automated testing, code shipping" />
    <meta name="author" content="ShipIt" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://shipit.dev" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shipit.dev" />
    <meta property="og:title" content="ShipIt — Open-Source AI Developer Workspace" />
    <meta property="og:description" content="4 AI engines. 100+ models. One control surface. Build, review, test, and ship production-ready code from a single message." />
    <meta property="og:image" content="https://shipit.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ShipIt — AI Developer Workspace with Claude, Codex, and Gemini" />
    <meta property="og:site_name" content="ShipIt" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShipIt — Open-Source AI Developer Workspace" />
    <meta name="twitter:description" content="4 AI engines. 100+ models. One control surface. Build, review, test, and ship production-ready code from a single message." />
    <meta name="twitter:image" content="https://shipit.dev/og-image.png" />
    <meta name="twitter:image:alt" content="ShipIt — AI Developer Workspace with Claude, Codex, and Gemini" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/shipit-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/shipit-icon.svg" />

    <!-- Theme -->
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ShipIt",
      "url": "https://shipit.dev",
      "description": "Open-source AI developer workspace that unifies Claude, Codex, Gemini, and 100+ models into one control surface for building, reviewing, testing, and shipping code.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Linux, macOS, Windows",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "4 AI engines: Claude, Codex, Gemini, ShipIt CLI",
        "100+ AI models from multiple providers",
        "Automated code review and security scanning",
        "Automated test execution (pytest, Jest, Vitest, Go, Cargo)",
        "Git-safe shipping with feature branches",
        "Slash commands for common workflows",
        "Slack and Discord notifications",
        "MCP server integrations"
      ],
      "softwareHelp": {
        "@type": "WebPage",
        "url": "https://shipit.dev"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ShipIt",
      "url": "https://shipit.dev",
      "logo": "https://shipit.dev/shipit-icon.svg",
      "description": "Open-source AI developer workspace"
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Prevent flash of wrong theme
      (function () {
        try {
          var theme = localStorage.getItem("shipit-theme") || "auto";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (theme === "dark" || (theme === "auto" && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
