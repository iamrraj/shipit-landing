      "operatingSystem": "Linux, macOS, Windows",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "7-step automated pipeline: parse, validate, implement, review, auto-fix, test, report",
        "4 AI engines: Claude Code CLI, OpenAI Codex CLI, Google Gemini CLI, ShipIt CLI",
        "100+ AI models from 9 providers (Bedrock, OpenAI, Google, Groq, Ollama, Together AI, OpenRouter, Vertex AI)",

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ShipIt",
      "url": "https://shipiit.com",
      "logo": "https://shipiit.com/shipit-icon.svg",

    <!-- Structured Data — FAQ (boosts search snippets) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is ShipIt?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ShipIt is an AI developer workspace with a 7-step delivery pipeline. It parses your task, implements changes across your full codebase, reviews code for quality and security, auto-fixes issues, runs tests, commits, creates pull requests, and notifies your team — all from a single prompt."
          }
        },
        {
          "@type": "Question",
          "name": "What AI engines does ShipIt support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ShipIt supports 4 AI engines: Claude Code CLI (Sonnet 4.6, Opus 4.6, Haiku 4.5), OpenAI Codex CLI (GPT-5.4, GPT-5.4 Mini), Google Gemini CLI (3.1 Pro, 2.5 Flash), and ShipIt CLI which routes across 100+ models from AWS Bedrock, OpenAI, Google, Groq, Ollama, Together AI, and OpenRouter."
          }
        },
        {
          "@type": "Question",
          "name": "Does ShipIt require API keys or config files?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Everything is configured through the visual Settings panel in the UI. Install engines with one click, authenticate via OAuth, and test connections — no .env files or manual configuration needed."
          }
        },
        {
          "@type": "Question",
          "name": "Does my code leave my machine?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. ShipIt runs 100% locally on your machine. The React frontend and FastAPI backend run on localhost. All pipeline steps, test execution, and code operations happen in your local environment. Git push and PR creation are explicitly opt-in."
          }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Prevent flash of wrong theme
      (function () {
        try {
          var theme = localStorage.getItem("shipit-theme") || "auto";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (theme === "dark" || (theme === "auto" && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
